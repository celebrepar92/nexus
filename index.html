<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Gestión de Asistencia</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link rel="icon" href="favicon.png" type="image/png">

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navbar Moderna */
        nav {
            width: 100%;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; color: var(--primary); }

        /* Contenedor Principal */
        #adminPanel {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* Inputs y Formulario */
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        input, select { 
            width: 100%; padding: 10px 12px; border: 1px solid var(--border); 
            border-radius: 8px; font-family: inherit; font-size: 14px; 
            transition: border-color 0.2s; outline: none;
        }
        input:focus { border-color: var(--primary); }

        .row { display: flex; gap: 12px; }

        /* Botones */
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            font-weight: 600; text-transform: uppercase; cursor: pointer; 
            transition: all 0.2s; font-size: 0.85rem;
        }
        
        #testModeBtn { margin-bottom: 25px; color: white; }
        #genBtn { background: var(--primary); color: white; margin-top: 10px; }
        #genBtn:hover { background: var(--primary-hover); }
        #genBtn:disabled { background: var(--border); cursor: not-allowed; }

        .note { font-size: 11px; color: var(--text-muted); margin-top: 5px; line-height: 1.4; }

        #qr-hidden, #temp-canvas { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="brand">NEXUS</div>
        <div data-netlify-identity-button></div>
    </nav>

    <div id="adminPanel" style="display: none;">
        
        <div class="card">
            <h2>Control de Acceso</h2>
            <button id="testModeBtn" class="btn" onclick="toggleMode()">Cargando estado...</button>
            <p class="note">Si la asistencia está <b>DESACTIVADA</b>, el sistema rechazará automáticamente cualquier envío fuera de horario.</p>
        </div>

        <div class="card">
            <h2>Configuración de Clase</h2>
            
            <div class="group">
                <label>Comisión / Formulario</label>
                <select id="urlInput">
                    <option value="https://forms.gle/brSJRWUR3K5Khzvs5">INVESTIGACIÓN (RF-INV)</option>
                    <option value="https://forms.gle/5TKAKNPiqyU6ab8N8">INTERVENCIÓN (RF-INT)</option>
                </select>
            </div>

            <div class="row">
                <div class="group" style="flex: 1;">
                    <label>Horario</label>
                    <input type="text" id="scheduleInput" value="9:00 a 11:00">
                </div>
                <div class="group" style="flex: 1;">
                    <label>Fecha</label>
                    <input type="date" id="dateInput">
                </div>
            </div>

            <h2 style="margin-top: 20px;">Personalización de Arte</h2>
            
            <div class="group">
                <label>Imagen (Archivo o URL)</label>
                <input type="file" id="fileInput" accept="image/*" style="margin-bottom: 8px;">
                <input type="text" id="customImgUrl" placeholder="https://url-de-la-imagen.jpg">
            </div>
            
            <div class="group">
                <label>Título de la Obra</label>
                <input type="text" id="customTitle" placeholder="Ej: La Noche Estrellada">
            </div>

            <div class="row">
                <div class="group" style="flex: 2;">
                    <label>Artista</label>
                    <input type="text" id="customArtist" placeholder="Vincent van Gogh">
                </div>
                <div class="group" style="flex: 1;">
                    <label>Año</label>
                    <input type="text" id="customYear" placeholder="1889">
                </div>
            </div>

            <button id="genBtn" class="btn" onclick="generatePDF()">Generar PDF de Asistencia</button>
        </div>

        <div id="qr-hidden"></div>
        <canvas id="temp-canvas"></canvas>
    </div>

    <script>
        /* LÓGICA DE IDENTIDAD (Netlify Identity) 
        */
        netlifyIdentity.on('init', user => {
            if (!user) {
                document.getElementById("adminPanel").style.display = "none";
                netlifyIdentity.open();
            } else {
                activarPanel();
            }
        });

        netlifyIdentity.on('login', () => {
            netlifyIdentity.close();
            activarPanel();
        });

        netlifyIdentity.on('logout', () => location.reload());

        function activarPanel() {
            document.getElementById("adminPanel").style.display = "block";
            checkStatus();
        }

        /* LÓGICA DE GOOGLE APPS SCRIPT (Misma que ya tenías)
        */
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyCz0xuSeFIHzZSUrKketDJPbPGUF4BGs2bVbCU2LcqgHFyQW-udbmE_l-UGLAHjfE7hQ/exec";
        const statusBtn = document.getElementById('testModeBtn');

        async function checkStatus() {
            try {
                const response = await fetch(WEB_APP_URL, { mode: 'cors' });
                const data = await response.json();
                updateButtonUI(data.testMode);
            } catch (err) {
                statusBtn.innerText = "Error de conexión";
            }
        }

        async function toggleMode() {
            if (statusBtn.disabled) return;
            statusBtn.disabled = true;
            statusBtn.innerText = "Actualizando...";
            try {
                const response = await fetch(`${WEB_APP_URL}?action=toggle`, { mode: 'cors' });
                const data = await response.json();
                updateButtonUI(data.testMode);
            } catch (err) {
                alert("Error al cambiar el estado");
            } finally {
                statusBtn.disabled = false;
            }
        }

        function updateButtonUI(isTestMode) {
            if (isTestMode) {
                statusBtn.innerText = "ASISTENCIA: DESACTIVADA (MODO PRUEBA)";
                statusBtn.style.backgroundColor = "#ef4444"; // Rojo moderno
            } else {
                statusBtn.innerText = "ASISTENCIA: ACTIVADA (MODO REAL)";
                statusBtn.style.backgroundColor = "#10b981"; // Verde moderno
            }
        }

        /* LÓGICA DE GENERACIÓN DE PDF (Se mantiene intacta) 
        */
        // ... (Aquí va todo tu código de translateTitle, fetchAIC, fetchTheMet, processImg, getFileData y generatePDF exactamente como los tenías)
        // [Copiado de tu index.html original para asegurar que el PDF no cambie]
        
        async function translateTitle(text) {
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|es`);
                const data = await res.json();
                return data.responseData.translatedText;
            } catch (e) { return text; }
        }

        async function fetchAIC() {
            const seed = Math.floor(Math.random() * 800);
            const r = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=painting&query[term][is_public_domain]=true&limit=1&page=${seed}&fields=title,artist_title,date_display,image_id`);
            const data = await r.json();
            const art = data.data[0];
            return {
                title: art.title,
                artist: art.artist_title || "Desconocido",
                date: art.date_display || "s/f",
                img: `https://www.artic.edu/iiif/2/${art.image_id}/full/1000,/0/default.jpg`,
                ref: `AIC_${art.image_id.substring(0,6)}`
            };
        }

        async function fetchTheMet() {
            const rSearch = await fetch(`https://collectionapi.metmuseum.org/public/collection/v1/search?isHighlight=true&q=painting&hasImages=true`);
            const dataSearch = await rSearch.json();
            const randomId = dataSearch.objectIDs[Math.floor(Math.random() * dataSearch.objectIDs.length)];
            const rObj = await fetch(`https://collectionapi.metmuseum.org/public/collection/v1/objects/${randomId}`);
            const art = await rObj.json();
            return {
                title: art.title,
                artist: art.artistDisplayName || "Desconocido",
                date: art.objectDate || "s/f",
                img: art.primaryImageSmall || art.primaryImage,
                ref: `MET_${art.objectID}`
            };
        }

        function processImg(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const canvas = document.getElementById('temp-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 1000;
                    canvas.height = (img.height / img.width) * 1000;
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.filter = 'grayscale(100%) contrast(1.2) brightness(1.05)';
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve({ data: canvas.toDataURL('image/jpeg', 0.8), ratio: img.height / img.width });
                };
                img.onerror = () => resolve(null);
                img.src = url;
            });
        }

        function getFileData(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function generatePDF() {
            const btnGen = document.getElementById('genBtn');
            const fileInput = document.getElementById('fileInput');
            const customUrl = document.getElementById('customImgUrl').value;
            
            btnGen.innerText = "PROCESANDO...";
            btnGen.disabled = true;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });

            const url = document.getElementById('urlInput').value;
            const schedule = document.getElementById('scheduleInput').value;
            const dateVal = document.getElementById('dateInput').value;
            const d = dateVal ? new Date(dateVal + "T12:00:00") : new Date();
            const dateStr = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;

            doc.setFont("courier", "bold");
            doc.setFontSize(18);
            doc.text(`ASISTENCIA TALLER TFG - ${dateStr}`, 15, 20);
            
            const identiconUrl = `https://api.dicebear.com/9.x/identicon/png?seed=${encodeURIComponent(url)}&backgroundColor=ffffff`;
            const identicon = await processImg(identiconUrl);
            if (identicon) {
                doc.addImage(identicon.data, 'JPEG', 183, 8, 12, 12);
            }

            doc.setLineWidth(0.5);
            doc.line(15, 22, 195, 22);
            doc.setFont("courier", "normal");
            doc.setFontSize(9);

            const qrDiv = document.getElementById('qr-hidden');
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: url, width: 400, height: 400, colorDark: "#000" });
            await new Promise(r => setTimeout(r, 300));
            const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");
            doc.addImage(qrImg, 'PNG', 70, 35, 70, 70);

            doc.setFontSize(8);
            doc.text(url, 105, 110, { align: 'center' });
            doc.setFontSize(6);
            doc.text(`GENERADO EL ${new Date().toLocaleString('es-AR')}`, 105, 114, { align: 'center' });
            doc.setLineWidth(0.1);
            doc.line(40, 122, 170, 122);

            let artData = null;
            let finalImgSource = null;

            if (fileInput.files && fileInput.files[0]) {
                finalImgSource = await getFileData(fileInput.files[0]);
                artData = {
                    title: document.getElementById('customTitle').value || "Sin Título",
                    artist: document.getElementById('customArtist').value || "Desconocido",
                    date: document.getElementById('customYear').value || "s/f",
                    ref: "REF_SML"
                };
            } 
            else if (customUrl) {
                finalImgSource = customUrl;
                artData = {
                    title: document.getElementById('customTitle').value || "Sin Título",
                    artist: document.getElementById('customArtist').value || "Desconocido",
                    date: document.getElementById('customYear').value || "s/f",
                    ref: "CUSTOM_URL"
                };
            } 
            else {
                btnGen.innerText = "BUSCANDO EN MUSEOS...";
                artData = (Math.random() > 0.5) ? await fetchAIC() : await fetchTheMet();
                artData.title = await translateTitle(artData.title);
                finalImgSource = artData.img;
            }

            if (finalImgSource) {
                btnGen.innerText = "PROCESANDO IMAGEN...";
                const processed = await processImg(finalImgSource);
                if (processed) {
                    const maxH = 115; 
                    const maxW = 180;
                    let imgH = maxH;
                    let imgW = imgH / processed.ratio;
                    if (imgW > maxW) { imgW = maxW; imgH = imgW * processed.ratio; }

                    const startY = 130;
                    doc.addImage(processed.data, 'JPEG', (210 - imgW) / 2, startY, imgW, imgH);

                    let metaY = startY + imgH + 10;
                    doc.setFont("courier", "bold");
                    doc.setFontSize(10);
                    const titleLines = doc.splitTextToSize(artData.title.toUpperCase(), 160);
                    doc.text(titleLines, 105, metaY, { align: 'center' });
                    
                    metaY += (titleLines.length * 4.5) + 4; 
                    doc.setFont("courier", "normal");
                    doc.setFontSize(8);
                    const metaInfo = `ARTISTA: ${artData.artist.toUpperCase()} | FECHA: ${artData.date} | REF: ${artData.ref}`;
                    doc.text(metaInfo, 105, metaY, { align: 'center' });
                }
            }

            doc.setLineWidth(0.5);
            doc.line(95, 285, 115, 285);
            doc.save(`ASISTENCIA_TFG_${dateStr.replace(/\//g, '-')}.pdf`);
            btnGen.innerText = "Generar PDF de Asistencia";
            btnGen.disabled = false;
        }
    </script>
</body>
</html>
