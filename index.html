<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nexus - Asistencia TTFG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="icon" href="favicon.png" type="image/png">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
  // Manejo de la identidad y acceso
  netlifyIdentity.on('init', user => {
    if (!user) {
      // Si no hay usuario, nos aseguramos de que el panel esté oculto
      document.getElementById("adminPanel").style.display = "none";
      netlifyIdentity.open(); // Abre el modal de login automáticamente
    } else {
      // Si ya hay usuario al cargar, mostramos el panel directamente
      activarPanel(user);
    }
  });

  netlifyIdentity.on('login', user => {
    netlifyIdentity.close(); // Cerramos el modal de login
    activarPanel(user);      // Activamos el panel sin recargar la página
  });

  netlifyIdentity.on('logout', () => {
    // Al cerrar sesión, aquí sí conviene recargar para limpiar todo rastro
    location.reload();
  });

  function activarPanel(user) {
    const panel = document.getElementById("adminPanel");
    if (panel) {
      panel.style.display = "block";
      // Llamamos a la función que consulta el estado en Google Apps Script
      if (typeof checkStatus === "function") {
        checkStatus();
      }
    }
  }
</script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .config-panel { border: 2px solid #000; padding: 30px; width: 450px; background: #fff; box-shadow: 10px 10px 0px #000; }
        h1 { font-size: 1.1rem; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 8px; margin: 0 0 20px 0; }
        h2 { font-size: 0.8rem; text-transform: uppercase; margin-top: 20px; border-top: 1px solid #ccc; pt: 10px; color: #666; }
        .group { margin-bottom: 12px; }
        label { display: block; font-size: 9px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #000; box-sizing: border-box; font-family: inherit; font-size: 13px; }
        .row { display: flex; gap: 10px; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 20px; }
        button:hover { background: #333; }
        #qr-hidden, #temp-canvas { display: none; }
        .note { font-size: 10px; color: #666; font-style: italic; margin-top: 5px; }
    </style>
</head>
<body>
    <div data-netlify-identity-button></div>
    <div id="adminPanel" style="display: none;">
    <div class="config-panel">
        <h1 style="margin-bottom:0px !important;">NEXUS - Asistencia TTFG</h1>
        <button id="testModeBtn" id="genBtn" class="btn btn-off" onclick="toggleMode()">Cargando estado...</button>

        <br><br>
        
        <div class="group">
            <label>Tipo de formulario (link)</label>
            <select id="urlInput">
                <option value="https://forms.gle/brSJRWUR3K5Khzvs5">INVESTIGACIÓN (brSJR...)</option>
                <option value="https://forms.gle/5TKAKNPiqyU6ab8N8">INTERVENCIÓN (5TKAK...)</option>
            </select>
        </div>
        <div class="row">
            <div class="group" style="flex: 2;">
                <label>Horario</label>
                <input type="text" id="scheduleInput" value="9:00 a 11:00">
            </div>
            <div class="group" style="flex: 2;">
                <label>Fecha de clase</label>
                <input type="date" id="dateInput">
            </div>
        </div>

        <h2>Obra de arte personalizada (opcional)</h2>
        <p class="note">Si se deja vacío, se usará una obra aleatoria de museos.</p>
        
        <div class="group">
            <label>Subir imagen o pegar URL</label>
            <input type="file" id="fileInput" accept="image/*" style="margin-bottom: 5px; border: none; padding: 0;">
            <input type="text" id="customImgUrl" placeholder="https://url-de-la-imagen.jpg">
        </div>
        
        <div class="group">
            <label>Título de la obra</label>
            <input type="text" id="customTitle" placeholder="Ej: La Noche Estrellada">
        </div>

        <div class="row">
            <div class="group" style="flex: 2;">
                <label>Artista</label>
                <input type="text" id="customArtist" placeholder="Ej: Vincent van Gogh">
            </div>
            <div class="group" style="flex: 1;">
                <label>Año</label>
                <input type="text" id="customYear" placeholder="Ej: 1889">
            </div>
        </div>

        <button id="genBtn" onclick="generatePDF()">Generar PDF</button>
    </div>

    <div id="qr-hidden"></div>
    <canvas id="temp-canvas"></canvas>


    </div>
    <script>
        async function translateTitle(text) {
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|es`);
                const data = await res.json();
                return data.responseData.translatedText;
            } catch (e) { return text; }
        }

        async function fetchAIC() {
            const seed = Math.floor(Math.random() * 800);
            const r = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=painting&query[term][is_public_domain]=true&limit=1&page=${seed}&fields=title,artist_title,date_display,image_id`);
            const data = await r.json();
            const art = data.data[0];
            return {
                title: art.title,
                artist: art.artist_title || "Desconocido",
                date: art.date_display || "s/f",
                img: `https://www.artic.edu/iiif/2/${art.image_id}/full/1000,/0/default.jpg`,
                ref: `AIC_${art.image_id.substring(0,6)}`
            };
        }

        async function fetchTheMet() {
            const rSearch = await fetch(`https://collectionapi.metmuseum.org/public/collection/v1/search?isHighlight=true&q=painting&hasImages=true`);
            const dataSearch = await rSearch.json();
            const randomId = dataSearch.objectIDs[Math.floor(Math.random() * dataSearch.objectIDs.length)];
            const rObj = await fetch(`https://collectionapi.metmuseum.org/public/collection/v1/objects/${randomId}`);
            const art = await rObj.json();
            return {
                title: art.title,
                artist: art.artistDisplayName || "Desconocido",
                date: art.objectDate || "s/f",
                img: art.primaryImageSmall || art.primaryImage,
                ref: `MET_${art.objectID}`
            };
        }

        function processImg(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const canvas = document.getElementById('temp-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 1000;
                    canvas.height = (img.height / img.width) * 1000;
                    
                    // FIX: Pintar fondo blanco para evitar fondo negro en PNGs transparentes
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.filter = 'grayscale(100%) contrast(1.2) brightness(1.05)';
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve({ data: canvas.toDataURL('image/jpeg', 0.8), ratio: img.height / img.width });
                };
                img.onerror = () => resolve(null);
                img.src = url;
            });
        }

        function getFileData(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function generatePDF() {
            const btn = document.getElementById('genBtn');
            const fileInput = document.getElementById('fileInput');
            const customUrl = document.getElementById('customImgUrl').value;
            
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });

            const url = document.getElementById('urlInput').value;
            const schedule = document.getElementById('scheduleInput').value;
            const dateVal = document.getElementById('dateInput').value;
            const d = dateVal ? new Date(dateVal + "T12:00:00") : new Date();
            const dateStr = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;

            // PDF HEADER
            doc.setFont("courier", "bold");
            doc.setFontSize(18);
            doc.text(`ASISTENCIA TALLER TFG - ${dateStr}`, 15, 20);
            
            // AGREGAR IDENTICON CON FONDO BLANCO FORZADO
            const identiconUrl = `https://api.dicebear.com/9.x/identicon/png?seed=${encodeURIComponent(url)}&backgroundColor=ffffff`;
            const identicon = await processImg(identiconUrl);
            if (identicon) {
                doc.addImage(identicon.data, 'JPEG', 183, 8, 12, 12);
            }

            doc.setLineWidth(0.5);
            doc.line(15, 22, 195, 22);
            doc.setFont("courier", "normal");
            doc.setFontSize(9);

            // Generar QR
            const qrDiv = document.getElementById('qr-hidden');
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: url, width: 400, height: 400, colorDark: "#000" });
            await new Promise(r => setTimeout(r, 300));
            const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");
            doc.addImage(qrImg, 'PNG', 70, 35, 70, 70);

            doc.setFontSize(8);
            doc.text(url, 105, 110, { align: 'center' });
            doc.setFontSize(6);
            doc.text(`GENERADO EL ${new Date().toLocaleString('es-AR')}`, 105, 114, { align: 'center' });
            doc.setLineWidth(0.1);
            doc.line(40, 122, 170, 122);

            // LÓGICA DE ARTE
            let artData = null;
            let finalImgSource = null;

            if (fileInput.files && fileInput.files[0]) {
                finalImgSource = await getFileData(fileInput.files[0]);
                artData = {
                    title: document.getElementById('customTitle').value || "Sin Título",
                    artist: document.getElementById('customArtist').value || "Desconocido",
                    date: document.getElementById('customYear').value || "s/f",
                    ref: "REF_SML"
                };
            } 
            else if (customUrl) {
                finalImgSource = customUrl;
                artData = {
                    title: document.getElementById('customTitle').value || "Sin Título",
                    artist: document.getElementById('customArtist').value || "Desconocido",
                    date: document.getElementById('customYear').value || "s/f",
                    ref: "CUSTOM_URL"
                };
            } 
            else {
                btn.innerText = "BUSCANDO EN MUSEOS...";
                artData = (Math.random() > 0.5) ? await fetchAIC() : await fetchTheMet();
                artData.title = await translateTitle(artData.title);
                finalImgSource = artData.img;
            }

            if (finalImgSource) {
                btn.innerText = "PROCESANDO IMAGEN...";
                const processed = await processImg(finalImgSource);
                
                if (processed) {
                    const maxH = 115; 
                    const maxW = 180;
                    let imgH = maxH;
                    let imgW = imgH / processed.ratio;
                    if (imgW > maxW) { imgW = maxW; imgH = imgW * processed.ratio; }

                    const startY = 130;
                    doc.addImage(processed.data, 'JPEG', (210 - imgW) / 2, startY, imgW, imgH);

                    let metaY = startY + imgH + 10;
                    doc.setFont("courier", "bold");
                    doc.setFontSize(10);
                    const titleLines = doc.splitTextToSize(artData.title.toUpperCase(), 160);
                    doc.text(titleLines, 105, metaY, { align: 'center' });
                    
                    metaY += (titleLines.length * 4.5) + 4; 
                    doc.setFont("courier", "normal");
                    doc.setFontSize(8);
                    const metaInfo = `ARTISTA: ${artData.artist.toUpperCase()} | FECHA: ${artData.date} | REF: ${artData.ref}`;
                    doc.text(metaInfo, 105, metaY, { align: 'center' });
                }
            }

            doc.setLineWidth(0.5);
            doc.line(95, 285, 115, 285);
            doc.save(`ASISTENCIA_TFG_${dateStr.replace(/\//g, '-')}.pdf`);
            btn.innerText = "Generar PDF";
            btn.disabled = false;
        }

        // ACTIVAR Y DESACTIVAR TEST MODE
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyCz0xuSeFIHzZSUrKketDJPbPGUF4BGs2bVbCU2LcqgHFyQW-udbmE_l-UGLAHjfE7hQ/exec"; // <--- PEGA TU URL AQUÍ
        const btn = document.getElementById('testModeBtn');

  async function checkStatus() {
    try {
      // Usamos 'cors' explícitamente
      const response = await fetch(WEB_APP_URL, {
        method: 'GET',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' }
      });
      
      const data = await response.json();
      updateButtonUI(data.testMode);
    } catch (err) {
      console.error("Error al cargar:", err);
      btn.innerText = "Error (Mira la consola F12)";
    }
  }

  async function toggleMode() {
    if (btn.disabled) return;
    
    btn.disabled = true;
    btn.innerText = "Cambiando...";
    
    try {
      // IMPORTANTE: Agregamos el parámetro toggle
      const response = await fetch(`${WEB_APP_URL}?action=toggle`, {
        method: 'GET',
        mode: 'cors'
      });
      const data = await response.json();
      updateButtonUI(data.testMode);
    } catch (err) {
      console.error("Error al cambiar:", err);
      alert("No se pudo cambiar el modo. Revisa la consola.");
    } finally {
      btn.disabled = false;
    }
  }

  function updateButtonUI(isTestMode) {
    if (isTestMode) {
      btn.innerText = "DESACTIVAR ASISTENCIA";
      btn.style.backgroundColor = "#880808"; // Rojo
    } else {
      btn.innerText = "ACTIVAR ASISTENCIA";
      btn.style.backgroundColor = "#008000"; // Verde
    }
  }

  // Ejecutar al cargar
  checkStatus();
    </script>
</body>
</html>
